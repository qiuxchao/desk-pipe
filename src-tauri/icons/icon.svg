<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>
  <!-- macOS icon: 824x824 content centered in 1024x1024 canvas -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <!-- Pipe/flow symbol -->
  <g fill="none" stroke="#ffffff" stroke-width="45" stroke-linecap="round" stroke-linejoin="round">
    <!-- Input node -->
    <circle cx="324" cy="388" r="58" fill="#ffffff" fill-opacity="0.15"/>
    <!-- Processing node -->
    <rect x="453" y="453" width="118" height="118" rx="26" fill="#ffffff" fill-opacity="0.15"/>
    <!-- Output node -->
    <circle cx="700" cy="636" r="58" fill="#ffffff" fill-opacity="0.15"/>
    <!-- Connecting lines -->
    <path d="M 372 420 Q 422 460 453 512" />
    <path d="M 571 540 Q 620 570 652 600" />
  </g>
  <!-- Dot accents -->
  <circle cx="324" cy="388" r="20" fill="#ffffff"/>
  <circle cx="512" cy="512" r="20" fill="#ffffff"/>
  <circle cx="700" cy="636" r="20" fill="#ffffff"/>
</svg>
